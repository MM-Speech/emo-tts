services:
  tts:
    image: soar97/triton-emo-tts:24.12
    shm_size: '1gb'
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    environment:
      - PYTHONIOENCODING=utf-8
      - MODEL_ID=${MODEL_ID}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: >
      /bin/bash -c "pip install vocos && rm -rf Emo-TTS && git clone https://github.com/SWivid/Emo-TTS.git && cd Emo-TTS/src/emo_tts/runtime/triton_trtllm/ && bash run.sh 0 4 $MODEL"
